<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>SEOツールデモ | タイトル・ディスクリプションチェック</title>
  <meta name="description" content="タイトルやディスクリプションの文字数をチェックできるシンプルなSEOツールのデモページです。GitHub Pages上で動作します。">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      padding: 40px;
      line-height: 1.6;
    }
    .container {
      max-width: 800px;
      margin: auto;
      background: #fff;
      padding: 30px;
      border-radius: 10px;
    }
    h1 {
      font-size: 24px;
    }
    textarea {
      width: 100%;
      height: 100px;
      margin-bottom: 10px;
      padding: 10px;
      font-size: 14px;
    }
    .result {
      margin-top: 10px;
      font-weight: bold;
    }
    a {
      color: #0073e6;
    }
    .footer {
      margin-top: 40px;
      font-size: 14px;
      color: #666;
    }
  </style>
</head>

<body>
<div class="container">

  <h1>SEOタイトル・ディスクリプションチェックツール</h1>

  <p>
    タイトルとディスクリプションの文字数を簡単に確認できるテストツールです。
    SEO対策の初期チェックに利用できます。
  </p>

  <h2>タイトル入力</h2>
  <textarea id="titleInput" placeholder="タイトルを入力"></textarea>
  <div class="result" id="titleCount">文字数: 0</div>

  <h2>ディスクリプション入力</h2>
  <textarea id="descInput" placeholder="ディスクリプションを入力"></textarea>
  <div class="result" id="descCount">文字数: 0</div>

  <div class="footer">
    <p>
      本ツールの詳細や本格的なSEO対策については
      <a href="https://あなたのサイト.com" target="_blank">こちら</a>
    </p>
  </div>

</div>

<script>
  const titleInput = document.getElementById('titleInput');
  const descInput = document.getElementById('descInput');

  titleInput.addEventListener('input', () => {
    document.getElementById('titleCount').innerText =
      "文字数: " + titleInput.value.length;
  });

  descInput.addEventListener('input', () => {
    document.getElementById('descCount').innerText =
      "文字数: " + descInput.value.length;
  });
</script>

</body>
</html>
